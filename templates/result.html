<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Generation Result</title>
    <style>
      .container { max-width: 900px; margin: 20px auto; }
      textarea { width: 100%; height: 320px; }
      .preview { border:1px solid #ccc; padding:10px; margin-top:10px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Generated by {{ provider }}</h1>

      <form action="/save" method="post" id="saveForm">
        <label>Title:<br />
          <input type="text" name="title" id="titleInput" value="{{ title }}" style="width:100%" />
        </label>

        <label>Content (Markdown):<br />
          <textarea name="content" id="contentInput">{{ content }}</textarea>
        </label>

        <button type="submit">Save to _posts</button>
        <button type="button" id="togglePreview">Toggle Preview</button>
        <a href="/">Back</a>
      </form>

      <div id="preview" class="preview" style="display:none"></div>
    </div>

    <script>
      // Minimal client-side markdown-ish renderer for preview
      function escapeHtml(s){ return s.replace(/[&<>\"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

      function renderMarkdown(src){
        // Handle code blocks
        src = src.replace(/```([\s\S]*?)```/g, function(_, code){ return '<pre>'+escapeHtml(code)+'</pre>'; });

        let lines = src.split(/\n/);
        let out = '';
        for(let i=0;i<lines.length;i++){
          let line = lines[i];
          if(/^#{1}\s+/.test(line)){
            out += '<h1>'+escapeHtml(line.replace(/^#\s+/,''))+'</h1>';
          } else if(/^#{2}\s+/.test(line)){
            out += '<h2>'+escapeHtml(line.replace(/^##\s+/,''))+'</h2>';
          } else if(/^\*\s+/.test(line)){
            out += '<li>'+escapeHtml(line.replace(/^\*\s+/,''))+'</li>';
          } else if(line.trim()===''){
            out += '<p></p>';
          } else {
            // inline bold/italic
            let html = escapeHtml(line)
              .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
              .replace(/\*(.*?)\*/g,'<em>$1</em>')
              .replace(/\[(.*?)\]\((.*?)\)/g,'<a href="$2">$1</a>');
            out += '<p>'+html+'</p>';
          }
        }
        return out;
      }

      const contentInput = document.getElementById('contentInput');
      const previewEl = document.getElementById('preview');
      const toggleBtn = document.getElementById('togglePreview');

      toggleBtn.addEventListener('click', function(){
        if(previewEl.style.display==='none'){
          previewEl.innerHTML = renderMarkdown(contentInput.value);
          previewEl.style.display = 'block';
          toggleBtn.textContent = 'Hide Preview';
        } else {
          previewEl.style.display = 'none';
          toggleBtn.textContent = 'Toggle Preview';
        }
      });

      // Live update preview when visible
      contentInput.addEventListener('input', function(){
        if(previewEl.style.display!=='none'){
          previewEl.innerHTML = renderMarkdown(contentInput.value);
        }
      });
    </script>
  </body>
</html>
